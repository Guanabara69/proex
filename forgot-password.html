<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - VetConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-paw"></i> VetConnect</h1>
            <p>Recuperação de Senha</p>
        </div>
        <form id="forgotForm">
            <div class="form-group">
                <label for="email">E-mail cadastrado</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="btn">Enviar link de recuperação</button>
        </form>
        <div class="auth-footer">
            <p><a href="login.html">Voltar para o login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Se o e-mail estiver cadastrado, você receberá um link de recuperação em instantes.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
